name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish package and create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        if: hashFiles('pnpm-lock.yaml') != ''
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ] && [ "${GITHUB_REF_NAME}" != "${PACKAGE_VERSION}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            echo "Use v${PACKAGE_VERSION} or ${PACKAGE_VERSION} for the release tag."
            exit 1
          fi

      - name: Verify release
        run: npm run release:verify

      - name: Check published package version
        id: published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        if: steps.published.outputs.exists != 'true'
        run: npm publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
